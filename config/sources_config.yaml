# Consolidated Configuration for Inopli Correlator
# This file now contains both datasources and middleware configurations

# Global middleware settings
middleware:
  enabled: true
  polling_interval: 30  # seconds between polling cycles
  alert_processing:
    max_queue_size: 1000
    batch_size: 10
    timeout: 30  # seconds
  monitoring:
    health_check_interval: 300  # seconds
    metrics_enabled: true
    debug_mode: false

# Connector configurations (global settings)
connectors:
  wazuh:
    enabled: true
    file_monitoring: true
    buffer_size: 8192
  qradar:
    enabled: true  # Global enable/disable for QRadar connector type
  arcsight:
    enabled: true  # Global enable/disable for ArcSight connector type
    file_monitoring: true

# Multi-tenant configuration
tenants:
  tenant1:
    name: "Tenant Example"
    token: "YOUR_INOPLI_TOKEN_HERE"

    # Legacy datasources (for backward compatibility)
    data_sources:
      - name: "linux_auth"
        path: "/var/log/auth.log"
        enabled: false
        module: "linux"
        event_types: [1001, 1002, 1007, 1004, 1006]
        filters: {}

      - name: "linux_syslog"
        path: "/var/log/syslog"
        enabled: false
        module: "linux"
        event_types: [1004]
        filters: {}

      - name: "wazuh_alerts"
        path: "/var/ossec/logs/alerts/alerts.json"
        enabled: false
        module: "wazuh_file"
        event_types: [100001, 100002, 81633]
        filters:
          agent_ids: ["*"]

      - name: "crowdstrike"
        path: "/var/log/crowdstrike/events.log"
        enabled: false
        module: "crowdstrike"
        event_types: [111171, 111172]
        filters:
          sensor_ids: ["CS-01", "CS-02"]

      - name: "o365_alerts"
        path: "/var/ossec/logs/alerts/alerts.json"
        enabled: false
        module: "wazuh_o365"
        event_types: [91556]
        filters:
          organization_ids: ["abcdefg"]

    # New middleware siem_sources
    siem_sources:
      qradar_prod:
        enabled: true
        module: "qradar"
        connector_type: "qradar"
        polling_interval: 1  # minutes between API calls
        api_config:
          base_url: "https://your-qradar-server.com"
          auth_token: "YOUR_QRADAR_AUTH_TOKEN"
          api_version: "17"
          verify_ssl: false
        collection_control:
          last_offense_id: 0
          save_last_id: true
          id_file_path: "config/qradar_prod_last_id.json"
        batch_size: 100
        status_filter: "OPEN"
        rule_filters:
          rule_ids: ["*"]
          min_severity: 5
        source_filters:
          source_networks: ["*"]
        alert_mode: "all"
      
      arcsight_prod:
        enabled: false  # Set to true to activate
        module: "arcsight"
        connector_type: "arcsight"
        directory_path: "C:/path/to/arcsight/export"  # Windows path or /var/arcsight/export for Linux
        file_pattern: "*.xml"  # Monitor all XML files
        polling_interval: 5  # Seconds between health checks
        
        parse_options:
          preserve_nested: true  # Keep nested structure like agent.address
          include_flat_fields: true  # Also include flat fields like agentAddress
          encoding: "UTF-8"
          max_file_size_mb: 100  # Skip files larger than this
        
        rule_filters:
          rule_ids: ["*"]  # Wildcard accepts all, or ["INOPLI - Brute Force", "INOPLI - Suspicious"]
          min_severity: 2  # 1=Low, 2=Medium, 3=High, 4=VeryHigh
        
        alert_mode: "all"  # all | cti_only | none